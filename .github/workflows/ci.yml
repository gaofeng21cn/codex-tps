name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Lint
        run: xcrun swift-format lint --recursive Sources Tests Package.swift
      - name: Test
        run: swift test
      - name: Package DMG
        run: ./scripts/build-dmg.sh
      - uses: actions/upload-artifact@v4
        with:
          name: codex-tps-dmg
          path: |
            dist/Codex-TPS.dmg
            dist/Codex-TPS.dmg.sha256
